version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: docmind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docmind-network

  redis:
    image: redis:7-alpine
    container_name: docmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docmind-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docmind-backend
    environment:
      APP_NAME: DocMind API
      APP_VERSION: 0.1.0
      APP_ENV: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/docmind
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - docmind-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docmind-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - docmind-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  docmind-network:
    driver: bridge
